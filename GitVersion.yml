workflow: GitFlow/v1
assembly-versioning-scheme: MajorMinorPatch
tag-prefix: 'v'
mode: ContinuousDeployment

branches:
  main:
    regex: ^master$|^main$
    label: ''
    increment: Patch
    prevent-increment-when-current-commit-tagged: true
    track-merge-target: false
    is-main-branch: true

  develop:
    regex: ^dev(elop)?(ment)?$
    label: alpha
    increment: Minor
    is-main-branch: false

  feature:
    regex: ^features?[/-]
    label: 'feat-{BranchName}'
    increment: Inherit
    source-branches: ['develop', 'main']

  release:
    regex: ^releases?[/-]
    label: beta
    increment: None
    source-branches: ['develop', 'main']

  hotfix:
    regex: ^hotfix(es)?[/-]
    label: beta
    increment: Patch
    source-branches: ['main']

  pull-request:
    regex: ^(pull|pr)[/-]
    label: PullRequest
    increment: Inherit

merge-message-formats: {}
